name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "\
            -X 'github.com/kashifsb/nurix/internal/cli.Version=ci' \
            -X 'github.com/kashifsb/nurix/internal/cli.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)' \
            -X 'github.com/kashifsb/nurix/internal/cli.Commit=$(git rev-parse --short HEAD)'" \
            -o nurix-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nurix-${{ matrix.goos }}-${{ matrix.goarch }}
          path: nurix-${{ matrix.goos }}-${{ matrix.goarch }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nurix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run tests
        env:
          NURIX_TEST_DB_HOST: localhost
          NURIX_TEST_DB_PORT: 5432
          NURIX_TEST_DB_USER: postgres
          NURIX_TEST_DB_PASSWORD: postgres
          NURIX_TEST_DB_NAME: nurix_test
        run: go test -v -race -count=1 ./...

      - name: Run tests with coverage
        env:
          NURIX_TEST_DB_HOST: localhost
          NURIX_TEST_DB_PORT: 5432
          NURIX_TEST_DB_USER: postgres
          NURIX_TEST_DB_PASSWORD: postgres
          NURIX_TEST_DB_NAME: nurix_test
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
